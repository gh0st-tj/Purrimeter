<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Purrimeter — fence in the cat</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐈</text></svg>">
<style>
:root {
  --bg1: #f4f2df;
  --bg2: #d9ecdc;
  --card: #fffffff0;
  --card-strong: #fffdf4;
  --ink: #25351f;
  --ink-soft: #5d6d55;
  --line: #27351d26;
  --grass-a: #95c95f;
  --grass-b: #7fb853;
  --grass-lit-a: #ecd98a; /* hay-field meadow, enclose.horse style */
  --grass-lit-b: #e3cf7c;
  --water: #63afe0;
  --water-deep: #2e79b5;
  --rock: #8b887c;
  --fence: #744a27;
  --fence-light: #b47b43;
  --accent: #e86f31;
  --accent-2: #8e5bd9;
  --roam: #f3cf43;
  --danger: #cf463b;
  --good: #2f9652;
  --gold: #dba510;
  --sky: #5aa6d6;
  --shadow: 0 18px 45px #2a381b24;
  --shadow-soft: 0 8px 24px #2a381b18;
  --radius: 8px;
  --radius-lg: 12px;
  --btn-bg: #ffffffd4;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg1: #182216;
    --bg2: #10170e;
    --card: #222d1eee;
    --card-strong: #293522;
    --ink: #edf3e5;
    --ink-soft: #b9c5ae;
    --line: #edf3e526;
    --grass-a: #5c8f37;
    --grass-b: #47782f;
    --grass-lit-a: #b39b4e;
    --grass-lit-b: #a89044;
    --water: #397daf;
    --water-deep: #235f90;
    --rock: #686458;
    --shadow: 0 18px 45px #00000070;
    --shadow-soft: 0 8px 24px #00000048;
    --btn-bg: #3b4834; /* readable dark pills — no more white-on-white */
  }
}
* { box-sizing: border-box; margin: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Nunito', ui-rounded, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  color: var(--ink);
  min-height: 100vh;
  background:
    linear-gradient(90deg, #ffffff18 1px, transparent 1px) 0 0 / 26px 26px,
    linear-gradient(180deg, #ffffff18 1px, transparent 1px) 0 0 / 26px 26px,
    linear-gradient(180deg, var(--bg1), var(--bg2)) fixed;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(110deg, transparent 0 42%, #ffffff24 42% 43%, transparent 43% 100%),
    repeating-linear-gradient(135deg, #25351f08 0 1px, transparent 1px 18px);
  mix-blend-mode: soft-light;
}
#app { max-width: 620px; margin: 0 auto; padding: 16px 14px 98px; position: relative; }
h1 { font-size: 38px; line-height: 0.95; font-weight: 950; letter-spacing: 0; }
h2 { letter-spacing: 0; }
h3 { font-size: 17px; margin-bottom: 4px; letter-spacing: 0; }
p { line-height: 1.35; }
.center { text-align: center; }
.soft { color: var(--ink-soft); }
.small { font-size: 13px; }
.eyebrow {
  color: var(--accent);
  font-size: 11px;
  font-weight: 950;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 6px;
}

nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 40;
  display: flex;
  justify-content: center;
  gap: 6px;
  padding: 8px 10px calc(10px + env(safe-area-inset-bottom));
  background: color-mix(in srgb, var(--card) 88%, transparent);
  backdrop-filter: blur(18px) saturate(140%);
  border-top: 1px solid var(--line);
  box-shadow: 0 -10px 30px #0001;
}
nav button {
  flex: 1;
  max-width: 126px;
  border: 0;
  background: transparent;
  color: var(--ink-soft);
  font: inherit;
  font-size: 12px;
  font-weight: 900;
  padding: 7px 4px;
  border-radius: var(--radius);
  cursor: pointer;
}
nav button .ico { display: block; font-size: 20px; margin-bottom: 2px; }
nav button.active { color: #fff; background: var(--accent); box-shadow: 0 8px 18px #e86f3136; }

.card {
  background: var(--card);
  backdrop-filter: blur(12px) saturate(120%);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px;
  margin: 12px 0;
  box-shadow: var(--shadow-soft);
}
.row { display: flex; align-items: center; gap: 10px; }
.row .grow { flex: 1; }
.section-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }

.btn {
  border: 0;
  cursor: pointer;
  font: inherit;
  font-weight: 950;
  color: var(--ink);
  background: var(--btn-bg);
  padding: 11px 18px;
  border-radius: 999px;
  box-shadow: 0 4px 12px #0002;
  transition: transform .14s ease, box-shadow .14s ease, background .14s ease, opacity .14s ease;
}
.btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px #0002; }
.btn:active { transform: translateY(1px) scale(0.98); }
.btn.primary { background: var(--accent); color: #fff; }
.btn.good { background: var(--good); color: #fff; }
.btn.ghost { background: transparent; box-shadow: none; color: var(--ink-soft); }
.btn:disabled { opacity: 0.42; cursor: default; transform: none; box-shadow: none; }
.btn.toggled { background: var(--roam); color: #4a3b00; }

.hero-card {
  position: relative;
  overflow: hidden;
  min-height: 170px;
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  align-items: center;
  gap: 10px;
  padding: 24px 22px;
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  background: linear-gradient(180deg, var(--card-strong), var(--card));
  box-shadow: var(--shadow);
}
.hero-card p { margin-top: 10px; color: var(--ink-soft); font-weight: 750; max-width: 300px; }
.hero-art {
  position: relative;
  min-height: 126px;
  border-radius: var(--radius);
  background:
    linear-gradient(180deg, #8bc7e8 0 46%, #95c95f 46% 100%);
  border: 1px solid #ffffff80;
  box-shadow: inset 0 0 0 1px #00000010;
}
.hero-art::before {
  content: '';
  position: absolute;
  left: 0;
  right: 0;
  bottom: 24px;
  height: 18px;
  background: repeating-linear-gradient(90deg, var(--fence) 0 12px, transparent 12px 22px);
  border-top: 5px solid var(--fence-light);
  border-bottom: 5px solid var(--fence-light);
}
.hero-sun { position: absolute; right: 14px; top: 8px; color: #ffcf4a; font-size: 24px; }
.hero-cat { position: absolute; left: 50%; top: 42%; transform: translate(-50%, -50%); font-size: 54px; filter: drop-shadow(0 5px 5px #0004); }
.hero-fence { position: absolute; left: 12px; bottom: 7px; color: #ffffffa0; font-weight: 950; letter-spacing: 2px; }

.home-stats { margin-top: 12px; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.stat {
  text-align: center;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 10px 4px;
  box-shadow: var(--shadow-soft);
}
.stat b { display: block; font-size: 22px; line-height: 1; }
.stat span { font-size: 11px; font-weight: 900; color: var(--ink-soft); }

.lv-item { display: flex; align-items: center; gap: 12px; padding: 10px 8px; border-radius: var(--radius); cursor: pointer; }
.lv-item:hover { background: #8881; }
.daily-feature { padding: 12px; background: linear-gradient(90deg, #f28c4018, transparent); }
.lv-num {
  width: 44px;
  height: 44px;
  border-radius: var(--radius);
  background: var(--good);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 950;
  font-size: 18px;
  flex: none;
  box-shadow: inset 0 -8px 14px #0002;
}
.lv-num.daily { background: var(--accent); }
.lv-num.ai { background: var(--accent-2); }
.stars { color: var(--gold); font-size: 13px; letter-spacing: 1px; white-space: nowrap; }
.stars .off { opacity: 0.25; }

.trail-card { padding: 16px 10px 8px; overflow: hidden; }
.progress-pill {
  min-width: 52px;
  text-align: center;
  border-radius: 999px;
  padding: 7px 10px;
  color: #fff;
  background: var(--good);
  font-size: 12px;
  font-weight: 950;
  box-shadow: 0 8px 18px #2f965238;
}
.trail-progress {
  height: 8px;
  margin: 8px 6px 2px;
  border-radius: 999px;
  background: #25351f18;
  overflow: hidden;
}
.trail-progress span {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--good), var(--gold));
  transition: width .6s cubic-bezier(.34,1,.64,1);
}
.path-wrap { position: relative; margin: 6px 0; }
.path-wrap svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }
.trail-shadow {
  stroke: #00000016;
  stroke-width: 14;
  stroke-linecap: round;
}
.trail-path {
  stroke: color-mix(in srgb, var(--fence-light) 70%, var(--ink) 10%);
  stroke-width: 5;
  stroke-linecap: round;
  stroke-dasharray: 1 9;
  opacity: 0.85;
}
.trail-done {
  stroke: var(--good);
  stroke-dasharray: 0 100;
  opacity: 1;
  filter: drop-shadow(0 3px 4px #2f965244);
}
.path-node {
  position: absolute;
  transform: translate(-50%, -50%);
  width: 166px;
  cursor: pointer;
  user-select: none;
}
.path-card {
  position: relative;
  min-height: 86px;
  display: grid;
  align-content: start;
  gap: 4px;
  padding: 10px;
  border-radius: var(--radius);
  background: var(--card);
  border: 1px solid var(--line);
  box-shadow: var(--shadow-soft);
  transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
}
.path-node:hover .path-card { transform: translateY(-3px); box-shadow: var(--shadow); }
.path-node.done .path-card { border-color: color-mix(in srgb, var(--good) 45%, var(--line)); }
.path-node.next .path-card {
  border-color: var(--accent);
  box-shadow: 0 14px 34px #e86f3130;
}
.path-node.locked .path-card {
  opacity: 0.55;
  filter: grayscale(0.35);
  border-style: dashed;
}
.path-node.locked:hover .path-card {
  transform: none;
  box-shadow: var(--shadow-soft);
}
.node-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.node-badge { font-size: 22px; filter: drop-shadow(0 2px 2px #0002); }
.node-meta {
  font-size: 10px;
  font-weight: 950;
  text-transform: uppercase;
  color: var(--ink-soft);
  letter-spacing: 0.08em;
}
.node-stats { color: var(--ink-soft); font-size: 11px; font-weight: 850; }
.path-cat {
  position: absolute;
  z-index: 2;
  left: 50%;
  top: -28px;
  transform: translateX(-50%);
  font-size: 30px;
  filter: drop-shadow(0 4px 4px #0004);
}

#board-wrap { display: flex; justify-content: center; margin: 12px 0 10px; }
#board {
  position: relative;
  display: grid;
  gap: 3px;
  padding: 9px;
  border-radius: var(--radius-lg);
  background: linear-gradient(180deg, #2b3b2430, #ffffff2a);
  touch-action: none;
  user-select: none;
  box-shadow: inset 0 2px 9px #0002, var(--shadow);
  border: 1px solid #ffffff5c;
}
.tile {
  position: relative;
  border-radius: 18%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: calc(var(--ts) * 0.62);
  width: var(--ts);
  height: var(--ts);
  cursor: pointer;
  overflow: hidden;
  transition: transform .12s ease, filter .18s ease, background-color .22s ease, box-shadow .18s ease;
}
.tile::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, #ffffff35, transparent 44%, #00000010);
  pointer-events: none;
}
.tile.grass-a { background: var(--grass-a); }
.tile.grass-b { background: var(--grass-b); }
.tile.water { background: var(--water); cursor: default; box-shadow: inset 0 5px 0 #1d456655; }
.tile.water::before {
  content: '';
  position: absolute;
  left: 14%; top: 24%; width: 42%; height: 9%;
  border-radius: 999px;
  background: #ffffff88;
  animation: shimmer 2.8s ease-in-out infinite;
}
@keyframes shimmer { 0%, 100% { transform: translateX(0); opacity: .85; } 50% { transform: translateX(55%); opacity: .35; } }
.tile.water::after {
  content: '';
  position: absolute;
  width: 62%;
  height: 32%;
  border-radius: 50%;
  background: var(--water-deep);
  opacity: .6;
  top: 54%;
}
.tile.rock::after { content: '🪨'; position: relative; z-index: 1; filter: drop-shadow(0 2px 2px #0003); }
/* the enclosure becomes a harvested hay field: straw striping + wheat, like enclose.horse */
.tile.roam.grass-a, .tile.roam.grass-b {
  background: repeating-linear-gradient(180deg, #f0dd93 0 5px, #e2cb74 5px 10px);
  box-shadow: inset 0 0 0 1px #c9a53e4d;
}
@media (prefers-color-scheme: dark) {
  .tile.roam.grass-a, .tile.roam.grass-b {
    background: repeating-linear-gradient(180deg, #b89f52 0 5px, #a68c41 5px 10px);
    box-shadow: inset 0 0 0 1px #00000040;
  }
}
.tile .wheat {
  font-size: calc(var(--ts) * 0.62); opacity: 1; pointer-events: none;
  filter: saturate(1.15) drop-shadow(0 2px 1px #0002);
  animation: wheatIn .45s cubic-bezier(.34,1.56,.64,1) backwards;
}
@keyframes wheatIn { from { opacity: 0; transform: scale(.4) translateY(30%); } }
.tile.roam { box-shadow: inset 0 0 0 2px #fff7a980; }
.tile.roam.pop { animation: meadowWave .55s cubic-bezier(.34,1.56,.64,1) backwards; }
@keyframes meadowWave { 0% { transform: scale(.72); filter: brightness(1.65); } 60% { filter: brightness(1.18); } }
.tile.esc {
  box-shadow: inset 0 0 0 3px #ffd8d3, inset 0 0 0 100vmax #d94d4058;
  animation: pulse 1s infinite;
  z-index: 1;
}
/* fences stand up off the grass like enclose.horse walls: raised posts + ground shadow */
.tile.fence { overflow: visible; z-index: 3; }
.tile.fence::after {
  content: '';
  position: absolute;
  bottom: 3%; left: 12%; right: 12%; height: 14%;
  border-radius: 50%;
  background: #00000033;
}
.tile .fpost {
  position: absolute;
  left: 8%; right: 8%; top: -16%; bottom: 12%;
  border-radius: 12%;
  background:
    linear-gradient(180deg, transparent 0 20%, var(--fence-light) 20% 36%, transparent 36% 58%, var(--fence-light) 58% 74%, transparent 74% 100%),
    repeating-linear-gradient(90deg, var(--fence) 0 20%, transparent 20% 40%);
  filter: drop-shadow(0 5px 3px #00000040);
  z-index: 2;
  filter: drop-shadow(0 2px 2px #0004);
}
.tile .fpost.new { animation: pop .25s cubic-bezier(.34,1.56,.64,1); }
.tile.fence.optimal .fpost {
  background:
    linear-gradient(180deg, transparent 0 20%, var(--gold) 20% 36%, transparent 36% 58%, var(--gold) 58% 74%, transparent 74% 100%),
    repeating-linear-gradient(90deg, #8a6a00 0 20%, transparent 20% 40%);
  filter: drop-shadow(0 0 9px #f2b705c0);
}
.tile.placeable:hover { transform: scale(1.07); filter: saturate(1.08); z-index: 2; }
.tile .tile-cat { font-size: calc(var(--ts) * 0.8); filter: drop-shadow(0 3px 3px #0005); z-index: 2; }

/* items celebrate (or warn) when the pen closes around them */
.tile.roam .item.goodie { animation: claimBounce .55s cubic-bezier(.34,1.7,.64,1); }
.tile.roam .item.baditem { animation: claimShake .5s ease; }
.tile.roam:has(.baditem) { box-shadow: inset 0 0 0 2px #cf463b99; }
@keyframes claimBounce { 40% { transform: translateY(-30%) scale(1.25); } }
@keyframes claimShake { 25%, 75% { transform: translateX(-12%); } 50% { transform: translateX(12%); } }

/* gentle cue that the pen is sealed and can be submitted */
.btn.ready { animation: readyPulse 1.8s ease-in-out infinite; }
@keyframes readyPulse { 50% { box-shadow: 0 0 0 6px #2f965226, 0 4px 12px #0002; } }
.tile.enter { animation: tileIn .42s cubic-bezier(.34,1.4,.64,1) backwards; }
@keyframes tileIn { from { transform: translateY(10px) scale(0.7); opacity: 0; } }
@keyframes pop { from { transform: scale(0.3); opacity: 0; } }
@keyframes pulse { 50% { opacity: 0.68; } }
@keyframes shake { 20%, 60% { transform: translateX(-5px); } 40%, 80% { transform: translateX(5px); } }
.cat { animation: bob 2.2s ease-in-out infinite; display: inline-block; }
@keyframes bob { 50% { transform: translateY(-8%) rotate(-4deg); } }
.tile .deco { position: absolute; font-size: calc(var(--ts) * 0.35); opacity: .45; top: 6%; right: 8%; pointer-events: none; }
.tile .item { position: relative; z-index: 2; animation: wobble 3.4s ease-in-out infinite; text-shadow: 0 2px 3px #0003; }
.tile .goodie { filter: drop-shadow(0 0 8px #fff5a6); }
.tile .baditem { filter: drop-shadow(0 0 8px #d94d4060); }
.boxitem { display: grid; place-items: center; }
.boxitem em {
  position: absolute;
  right: -0.25em;
  bottom: -0.2em;
  min-width: 1.15em;
  height: 1.15em;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  background: var(--ink);
  color: var(--bg1);
  font-size: 0.32em;
  font-style: normal;
  font-weight: 950;
  border: 1px solid #ffffff90;
}
@keyframes wobble { 50% { transform: rotate(7deg) translateY(-4%); } }
#status.gold { color: #9a7600; }
.review-bar .btn { font-size: 13px; }

.tut-banner {
  border: 2px solid var(--accent);
  animation: pop .3s cubic-bezier(.34,1.56,.64,1);
  background: linear-gradient(90deg, #fff7ed, var(--card));
}
.tile.hint {
  box-shadow: 0 0 0 3px var(--accent), 0 0 16px var(--accent);
  animation: hintpulse 1s infinite;
  z-index: 3;
}
@keyframes hintpulse { 50% { box-shadow: 0 0 0 5px var(--accent), 0 0 24px var(--accent); } }
.btn.attn { animation: attn 1s infinite; }
@keyframes attn { 50% { transform: scale(1.06); box-shadow: 0 0 18px #e86f3168; } }

.bd-list { margin: 8px auto 2px; max-width: 260px; }
.bd-line {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  font-size: 14px;
  font-weight: 850;
  padding: 4px 6px;
  animation: bdIn .35s cubic-bezier(.34,1.4,.64,1) backwards;
}
.bd-pts { font-weight: 950; color: var(--good); }
.bd-pts.neg { color: var(--danger); }
@keyframes bdIn { from { opacity: 0; transform: translateX(-14px); } }

#tile-hint {
  min-height: 20px;
  font-size: 11.5px;
  font-weight: 800;
  color: var(--ink-soft);
  margin: -4px 0 4px;
}
.score-panel {
  max-width: min(100%, 520px);
  margin: -2px auto 8px;
  padding: 12px;
  border-radius: var(--radius);
  background: var(--card);
  border: 1px solid var(--line);
  box-shadow: var(--shadow-soft);
}
.score-panel.open { border-color: color-mix(in srgb, var(--danger) 48%, var(--line)); }
.score-panel.closed { border-color: color-mix(in srgb, var(--good) 36%, var(--line)); }
.score-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: baseline;
  margin-bottom: 6px;
}
.score-head b { font-size: 14px; font-weight: 950; }
.score-head span { font-size: 12px; font-weight: 850; color: var(--ink-soft); text-align: right; }
.score-row {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  font-size: 12.5px;
  font-weight: 850;
  padding: 3px 0;
  border-top: 1px solid #8882;
}
.score-row b { color: var(--good); }
.score-row b.neg, .danger-row b { color: var(--danger); }
.bar-row { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
.bar-label { width: 58px; font-size: 11px; font-weight: 900; color: var(--ink-soft); text-align: right; }
.bar-track { flex: 1; height: 14px; background: #8882; border-radius: 999px; overflow: hidden; }
.bar { height: 100%; background: var(--good); border-radius: 999px; transition: width .6s cubic-bezier(.34,1.2,.64,1); }
.bar-gold { background: var(--gold); }
.bar-n { width: 20px; font-size: 12px; font-weight: 900; color: var(--ink-soft); }

#hud {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 10px 13px;
  box-shadow: var(--shadow-soft);
}
.pips { display: flex; gap: 3px; flex-wrap: wrap; }
.pip { width: 8px; height: 17px; border-radius: 3px; background: var(--fence); opacity: 0.22; }
.pip.used { opacity: 1; box-shadow: 0 3px 8px #744a2740; }
#status { font-weight: 950; font-size: 15px; }
#status.bad { color: var(--danger); }
#status.ok { color: var(--good); }
.actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }

#overlay {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #11180bcc;
  backdrop-filter: blur(5px);
  padding: 20px;
}
#overlay .card {
  max-width: 410px;
  width: 100%;

<body>
<div id="app"></div>
<script>
/* ============================================================
   Purrimeter — game core (engine, solver, generator, codes)
   Pure logic, no DOM. Testable in Node.
   ============================================================ */

const DIRS = [[1, 0], [-1, 0], [0, 1], [0, -1]];
const BONUS = { y: 3, t: 10, u: -5 };
const EPOCH_UTC = Date.UTC(2026, 6, 1); // Daily #1 = July 1, 2026

// ---------- Level ----------
// map: array of equal-length strings.
// '.' grass  '~' pond  '#' rock  'C' cat  'y' yarn  't' tuna  'u' cucumber  '1'..'3' box pairs
function parseLevel(def) {
  const rows = def.map.length, cols = def.map[0].length;
  let cat = null;
  const pairs = {};
  for (let r = 0; r < rows; r++) {
    if (def.map[r].length !== cols) throw new Error('ragged map');
    for (let c = 0; c < cols; c++) {
      const ch = def.map[r][c];
      if (ch === 'C') cat = [r, c];
      if (ch >= '1' && ch <= '3') (pairs[ch] = pairs[ch] || []).push([r, c]);
    }
  }
  if (!cat) throw new Error('no cat');
  for (const k in pairs) if (pairs[k].length !== 2) throw new Error('unpaired box');
  return { ...def, rows, cols, cat, pairs };
}

const key = (r, c) => r * 100 + c;
const cellCh = (lv, r, c) => (lv.map[r][c] === 'C' ? '.' : lv.map[r][c]);
const isBlockTerrain = ch => ch === '~' || ch === '#';
const inB = (lv, r, c) => r >= 0 && r < lv.rows && c >= 0 && c < lv.cols;
const onBorder = (lv, r, c) => r === 0 || c === 0 || r === lv.rows - 1 || c === lv.cols - 1;

function boxTwin(lv) {
  const twin = new Map();
  for (const k in lv.pairs) {
    const [a, b] = lv.pairs[k];
    twin.set(key(a[0], a[1]), b);
    twin.set(key(b[0], b[1]), a);
  }
  return twin;
}

// ---------- Engine ----------
// fences: Set of key(r,c). Returns {reachable:Set, escaped, score, escapePath}
function evaluate(lv, fences) {
  const twin = boxTwin(lv);
  const seen = new Set([key(lv.cat[0], lv.cat[1])]);
  const q = [lv.cat];
  const parent = new Map();
  let escaped = false, escapeCell = null;
  for (let h = 0; h < q.length; h++) {
    const [r, c] = q[h];
    if (onBorder(lv, r, c) && !escaped) { escaped = true; escapeCell = [r, c]; }
    const nbrs = [];
    const tw = twin.get(key(r, c));
    if (tw && !fences.has(key(tw[0], tw[1]))) nbrs.push(tw);
    for (const [dr, dc] of DIRS) nbrs.push([r + dr, c + dc]);
    for (const [nr, nc] of nbrs) {
      if (!inB(lv, nr, nc)) continue;
      const k = key(nr, nc);
      if (seen.has(k) || fences.has(k)) continue;
      if (isBlockTerrain(cellCh(lv, nr, nc))) continue;
      seen.add(k); parent.set(k, key(r, c)); q.push([nr, nc]);
    }
  }
  let score = 0;
  if (!escaped) {
    for (const k of seen) {
      const r = Math.floor(k / 100), c = k % 100;
      score += 1 + (BONUS[cellCh(lv, r, c)] || 0);
    }
  }
  // Path from cat to the border (for the red "escape route" hint)
  let escapePath = null;
  if (escaped && escapeCell) {
    escapePath = [];
    let k = key(escapeCell[0], escapeCell[1]);
    while (k !== undefined) {
      escapePath.push(k);
      k = parent.get(k);
    }
  }
  return { reachable: seen, escaped, score, escapePath };
}

// ---------- Seeded RNG ----------
function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ---------- Solver (region-based simulated annealing) ----------
// Deterministic given the seed. Returns { best, fences:Set }
function solve(lv, { iters = 12000, restarts = 6, seed = 7 } = {}) {
  const rng = mulberry32(seed);
  const twin = boxTwin(lv);
  const passable = (r, c) => !isBlockTerrain(cellCh(lv, r, c));
  const interiorOk = (r, c) =>
    r > 0 && r < lv.rows - 1 && c > 0 && c < lv.cols - 1 && passable(r, c);

  const catK = key(lv.cat[0], lv.cat[1]);
  if (!interiorOk(lv.cat[0], lv.cat[1])) return { best: 0, fences: new Set() };

  const unkey = k => [Math.floor(k / 100), k % 100];

  function fencesFor(R) {
    const f = new Set();
    for (const k of R) {
      const [r, c] = unkey(k);
      for (const [dr, dc] of DIRS) {
        const nr = r + dr, nc = c + dc;
        if (!inB(lv, nr, nc)) continue;
        const nk = key(nr, nc);
        if (!R.has(nk) && passable(nr, nc)) f.add(nk);
      }
      const tw = twin.get(k);
      if (tw) { const tk = key(tw[0], tw[1]); if (!R.has(tk)) f.add(tk); }
    }
    return f;
  }
  function scoreOf(R) {
    let s = 0;
    for (const k of R) { const [r, c] = unkey(k); s += 1 + (BONUS[cellCh(lv, r, c)] || 0); }
    return s;
  }
  function connected(R) {
    const it = R.values().next().value;
    const seen = new Set([it]); const st = [it];
    while (st.length) {
      const k = st.pop(); const [r, c] = unkey(k);
      for (const [dr, dc] of DIRS) {
        const nk = key(r + dr, c + dc);
        if (R.has(nk) && !seen.has(nk)) { seen.add(nk); st.push(nk); }
      }
      const tw = twin.get(k);
      if (tw) { const tk = key(tw[0], tw[1]); if (R.has(tk) && !seen.has(tk)) { seen.add(tk); st.push(tk); } }
    }
    return seen.size === R.size;
  }
  const pick = arr => arr[Math.floor(rng() * arr.length)];

  let bestS = 0, bestF = new Set();
  for (let rst = 0; rst < restarts; rst++) {
    let R = new Set([catK]);
    let curObj = -1e9;
    let T = 4.0;
    for (let i = 0; i < iters; i++) {
      T = Math.max(0.05, T * 0.9996);
      const R2 = new Set(R);
      if (rng() < 0.6 || R.size <= 1) {
        const frontier = [];
        for (const k of R) {
          const [r, c] = unkey(k);
          for (const [dr, dc] of DIRS) {
            const nr = r + dr, nc = c + dc;
            if (!R.has(key(nr, nc)) && inB(lv, nr, nc) && interiorOk(nr, nc)) frontier.push(key(nr, nc));
          }
          const tw = twin.get(k);
          if (tw && !R.has(key(tw[0], tw[1])) && interiorOk(tw[0], tw[1])) frontier.push(key(tw[0], tw[1]));
        }
        if (!frontier.length) continue;
        R2.add(pick(frontier));
      } else {
        const cand = pick([...R]);
        if (cand === catK) continue;
        R2.delete(cand);
        if (!connected(R2)) continue;
      }
      const f2 = fencesFor(R2);
      const s2 = scoreOf(R2);
      const over = Math.max(0, f2.size - lv.walls);
      const obj = s2 - 12 * over;
      if (obj >= curObj || rng() < Math.exp((obj - curObj) / T)) {
        R = R2; curObj = obj;
        if (over === 0) {
          const real = evaluate(lv, f2);
          if (!real.escaped && real.score > bestS) { bestS = real.score; bestF = f2; }
        }
      }
    }
  }
  return { best: bestS, fences: bestF };
}

// ---------- Daily / procedural generator ----------
function dayNumber(now = Date.now()) {
  return Math.floor((now - EPOCH_UTC) / 86400000) + 1;
}

function generateLevel(seed, opts = {}) {
  const rng = mulberry32(seed);
  const ri = n => Math.floor(rng() * n);

  for (let attempt = 0; attempt < 60; attempt++) {
    const rows = 8 + ri(3), cols = 8 + ri(3);
    const g = Array.from({ length: rows }, () => Array(cols).fill('.'));
    const put = (r, c, ch) => { if (r >= 0 && r < rows && c >= 0 && c < cols) g[r][c] = ch; };

    // pond blobs
    const ponds = 1 + ri(2);
    for (let p = 0; p < ponds; p++) {
      let r = ri(rows), c = ri(cols);
      const len = 3 + ri(4);
      for (let i = 0; i < len; i++) {
        put(r, c, '~');
        const [dr, dc] = DIRS[ri(4)];
        r += dr; c += dc;
      }
    }
    // rocks
    const rocks = ri(5);
    for (let i = 0; i < rocks; i++) put(1 + ri(rows - 2), 1 + ri(cols - 2), '#');

    const freeInterior = [];
    for (let r = 2; r < rows - 2; r++)
      for (let c = 2; c < cols - 2; c++)
        if (g[r][c] === '.') freeInterior.push([r, c]);
    if (freeInterior.length < 12) continue;

    const takeFree = () => {
      for (let t = 0; t < 40; t++) {
        const p = freeInterior[ri(freeInterior.length)];
        if (g[p[0]][p[1]] === '.') return p;
      }
      return null;
    };

    const catP = takeFree(); if (!catP) continue;
    g[catP[0]][catP[1]] = 'C';

    const nYarn = 2 + ri(3), nTuna = rng() < 0.75 ? 1 : 0, nCuke = 1 + ri(3);
    for (let i = 0; i < nYarn; i++) { const p = takeFree(); if (p) g[p[0]][p[1]] = 'y'; }
    for (let i = 0; i < nTuna; i++) { const p = takeFree(); if (p) g[p[0]][p[1]] = 't'; }
    for (let i = 0; i < nCuke; i++) { const p = takeFree(); if (p) g[p[0]][p[1]] = 'u'; }
    if (rng() < 0.35) {
      const a = takeFree(), b = takeFree();
      if (a && b && (Math.abs(a[0] - b[0]) + Math.abs(a[1] - b[1])) > 4) {
        g[a[0]][a[1]] = '1'; g[b[0]][b[1]] = '1';
      }
    }

    const walls = 7 + ri(4);
    let lv;
    try {
      lv = parseLevel({ name: opts.name || 'Daily Garden', walls, map: g.map(r => r.join('')) });
    } catch (e) { continue; }

    // quality gate: solvable, decent score, and at least one special inside the optimum
    const sol = solve(lv, { iters: 9000, restarts: 5, seed: seed ^ 0x5eed });
    if (sol.best < 12) continue;
    const ev = evaluate(lv, sol.fences);
    let specialInside = false;
    for (const k of ev.reachable) {
      const ch = cellCh(lv, Math.floor(k / 100), k % 100);
      if (ch === 'y' || ch === 't' || (ch >= '1' && ch <= '3')) specialInside = true;
    }
    if (!specialInside) continue;

    lv.target = sol.best;
    lv.solution = [...sol.fences];
    lv.genAttempt = attempt;
    return lv;
  }
  // ultra-safe fallback
  return parseLevel({
    name: 'Fallback Garden', walls: 6, target: 7,
    map: ['~~~~....', '~.C.....', '~.......', '~~......', '........', '........', '........', '........'],
  });
}

// Spoiler-safe puzzle picture: terrain + items + cat, but NO fences and NO enclosure —

  const grid = lv ? '\n' + levelEmojiGrid(lv) : '';
  return `🐈 Purrimeter #${day}\n${starStr} ${score} pts (${pct}% of optimal) · ${fencesUsed}/${walls} fences${grid}\ncode: ${code}`;
}
function friendCode(day, name, score, stars) {

  let sum = 0;
  for (const ch of payload) sum = (sum * 31 + ch.charCodeAt(0)) % 997;
  const b64 = (typeof btoa !== 'undefined' ? btoa(payload + '|' + sum)

    const raw = (typeof atob !== 'undefined' ? atob(m[1]) : Buffer.from(m[1], 'base64').toString());
    const parts = raw.split('|');
    if (parts.length !== 5) return null;
    const [day, name, score, stars, sum] = parts;
    let s = 0;
    const payload = parts.slice(0, 4).join('|');
    for (const ch of payload) s = (s * 31 + ch.charCodeAt(0)) % 997;
    if (String(s) !== sum) return null;
    return { day: +day, name, score: +score, stars: +stars };
  } catch (e) { return null; }
}

// ---------- Demo "global" bots (deterministic per day) ----------
const BOT_NAMES = ['Whiskers', 'MittensMax', 'PurrLord', 'CatioQueen', 'FenceFan42', 'TunaTycoon', 'SirPounce', 'YarnYoda'];
function dailyBots(day, target) {
  const rng = mulberry32(day * 7919 + 13);
  const n = 5 + Math.floor(rng() * 3);
  const out = [];
  for (let i = 0; i < n; i++) {
    const name = BOT_NAMES[Math.floor(rng() * BOT_NAMES.length)] + (rng() < 0.3 ? Math.floor(rng() * 90 + 10) : '');
    const deficit = rng() < 0.25 ? 0 : Math.floor(rng() * Math.max(3, target * 0.45));
    const score = Math.max(1, target - deficit);
    out.push({ name, score, stars: score >= target ? 3 : score >= 0.8 * target ? 2 : 1 });
  }
  const seen = new Set();
  return out.filter(b => !seen.has(b.name) && seen.add(b.name)).sort((a, b) => b.score - a.score);
}

const AI_PROMPT = (seedHint) => `You are a puzzle designer for "Purrimeter", an enclosure puzzle game.

RULES OF THE GAME:
- Rectangular grid. '.'=grass, '~'=pond (impassable), '#'=rock (impassable), 'C'=cat (exactly one, on grass), 'y'=yarn(+3), 't'=tuna(+10), 'u'=cucumber(-5), '1'/'2'/'3'=cardboard box portals (each used digit must appear exactly twice; the cat teleports between matching boxes).
- The player places a limited number of fences on grass tiles to trap the cat. The cat moves only up/down/left/right. If it can reach the board edge, it escapes.
- Score = number of tiles the cat can roam inside the fence, plus item bonuses.

DESIGN PRINCIPLES for a great level:
- Put the cat near partial natural barriers (pond/rocks) so early fences feel efficient.
- Include one tempting "pitfall" area that costs more fences than it earns.
- Place a high-value item just outside the lazy enclosure so a smarter shape wins.
- Cucumbers should punish greedy expansion.
- 8-11 rows, 8-11 columns, 6-11 fences. Cat NOT on or adjacent to the border.
- Mix: 2-4 yarn, 0-1 tuna, 1-3 cucumbers, optionally 1-2 box pairs placed far apart.

{"name": "<2-3 word level name>", "walls": <int>, "map": ["<row string>", ...]}`;

function validateAiLevel(obj) {

  if (typeof obj.walls !== 'number' || obj.walls < 4 || obj.walls > 14) return 'bad wall count';
  const w = obj.map[0].length;
  if (obj.map.some(r => typeof r !== 'string' || r.length !== w)) return 'ragged rows';
  if (obj.map.length < 6 || obj.map.length > 14 || w < 6 || w > 14) return 'bad size';
  const flat = obj.map.join('');
  if (/[^.~#Cytu123]/.test(flat)) return 'illegal characters';
  if ((flat.match(/C/g) || []).length !== 1) return 'need exactly one cat';
  for (const digit of ['1', '2', '3']) {
    const n = (flat.match(new RegExp(digit, 'g')) || []).length;
    if (n !== 0 && n !== 2) return 'box portals must come in matching pairs';

  let lv;
  try { lv = parseLevel({ name: obj.name || 'AI Garden', walls: Math.round(obj.walls), map: obj.map }); }
  catch (e) { return e.message; }
  const [cr, cc] = lv.cat;
  if (cr <= 0 || cc <= 0 || cr >= lv.rows - 1 || cc >= lv.cols - 1) return 'cat on border';
  const sol = solve(lv, { iters: 10000, restarts: 5, seed: 42 });
  if (sol.best < 6) return 'not solvable well enough (best ' + sol.best + ')';
  lv.target = sol.best;
  lv.solution = [...sol.fences];
  return lv; // object = success
}

        store.set('daily_' + (S.mode === 'daily' ? S.day : S.archiveDay), { ...S.result, archived: S.mode === 'archive', target: server.target });
        if (server.stars === 3) confetti();
        refreshLeaderboard();
        render();
      } catch (e) {
        if (e.status === 409) {
          toast('Daily already submitted. Loading your result.');
          S.dailyLv = null;
          await startDaily();
        } else {
          toast(e.message || 'Network submit failed');
        }
      }
      return;
    }
    if (S.mode === 'tutorial') store.set('tutorialDone', true);
    const target = S.level.target || ev.score;
    const starsN = ev.score >= target ? 3 : ev.score >= 0.8 * target ? 2 : 1;
    const breakdown = scoreBreakdown(S.level, ev).lines;
    S.result = { score: ev.score, stars: starsN, fences: [...S.fences], walls: S.level.walls, breakdown };
    S.submitted = true; S.showOverlay = true; S.review = 'mine';
    bumpStats(ev.score, starsN, S.mode === 'daily');
    // personal submission history (for the stats screen)
    const hist = store.get('history', []);
    hist.push({ mode: S.mode, day: S.day, score: ev.score, target, stars: starsN, t: Date.now() });
    store.set('history', hist.slice(-200));
    if (S.mode === 'daily') store.set('daily_' + S.day, S.result);
    if (S.mode === 'archive') {
      // archived dailies keep your best result, never touch the streak
      const prev = store.get('daily_' + S.archiveDay, null);
      if (!prev || ev.score > prev.score) store.set('daily_' + S.archiveDay, { ...S.result, archived: true });
    }
    if (S.mode === 'campaign' || S.mode === 'tutorial') {
      const prog = store.get('campaign', {});
      const p = prog[S.levelIndex] || { score: 0, stars: 0 };
      prog[S.levelIndex] = { score: Math.max(p.score, ev.score), stars: Math.max(p.stars, starsN) };
      store.set('campaign', prog);
    }
    if (starsN === 3) confetti();
    render();
  }
  function confetti() {
    const em = ['🎉', '⭐', '🐾', '🧶', '✨'];
    for (let i = 0; i < 26; i++) {
      const d = document.createElement('div');
      d.className = 'confetti'; d.textContent = em[i % em.length];
      d.style.left = Math.random() * 100 + 'vw';
      d.style.animationDuration = 1.8 + Math.random() * 1.6 + 's';
      d.style.animationDelay = Math.random() * 0.5 + 's';
      document.body.appendChild(d);
      setTimeout(() => d.remove(), 4200);
    }
  }

  // ---------- share ----------
  function currentShare() {
    const r = S.result; if (!r) return '';
    if (S.mode === 'daily' || S.mode === 'archive') {
      const day = S.mode === 'archive' ? S.archiveDay : S.day;
      const base = shareText(day, settings.name || 'You', r.score, S.level.target, r.stars, r.fences.length, r.walls, S.level)
        .replace(/\ncode: PURR-[A-Za-z0-9+/]+$/, '');
      return base + (S.me && S.me.friendCode ? '\ncode: ' + S.me.friendCode : '');
    }
    // non-daily: same spoiler-safe puzzle picture, no friend code
    const starLine = '⭐'.repeat(r.stars) + '☆'.repeat(3 - r.stars);
    const pct = Math.round(100 * r.score / S.level.target);
    return `🐈 Purrimeter — ${S.level.name}\n${starLine} ${r.score} pts (${pct}% of optimal) · ${r.fences.length}/${r.walls} fences\n${levelEmojiGrid(S.level)}`;
  }
  async function doShare() {
    const txt = currentShare();
    try {
      if (navigator.share) { await navigator.share({ text: txt }); return; }
      await navigator.clipboard.writeText(txt);
      toast('Copied to clipboard!');
    } catch (e) { toast('Copy failed — select the text manually'); }
  }
  let toastTimer;
  function toast(msg) {
    let t = $('#toast');
    if (!t) { t = document.createElement('div'); t.id = 'toast'; document.body.appendChild(t); }
    t.textContent = msg;
    t.style.cssText = 'position:fixed;bottom:86px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg1);padding:10px 18px;border-radius:999px;font-weight:800;z-index:70;font-size:14px';
    clearTimeout(toastTimer); toastTimer = setTimeout(() => t.remove(), 2200);
  }

  // ---------- AI generation ----------
  // Public AI calls were removed for production. Owner generation lives behind /admin.html.

  // ---------- rendering ----------
  function render() {
    const views = { home: renderHome, game: renderGame, ranks: renderRanks, ailab: renderAiLab, settings: renderSettings, archive: renderArchive };
    app().innerHTML = views[S.view]();
    bindNav();
    if (S.view === 'home') { const t = $('#btn-tutorial'); if (t) t.onclick = startTutorial; }
    if (S.view === 'game') { bindBoard(); animateOverlay(); primeBoard(); }
    if (S.view === 'ailab') bindAiLab();
    if (S.view === 'settings') bindSettings();
    if (S.view === 'ranks') bindRanks();
  }

  function navBar() {
    if (S.view === 'game') return ''; // immersive play — no tab bar
    let items = [['ranks', '🏆', 'Ranks'], ['ailab', '🤖', 'AI Lab'], ['settings', '⚙️', 'Settings']];
    if (S.view !== 'home') items = [['home', '🏡', 'Home'], ...items];
    return '<nav>' + items.map(([v, ico, label]) =>
      `<button data-nav="${v}" class="${S.view === v ? 'active' : ''}"><span class="ico">${ico}</span>${label}</button>`).join('') + '</nav>';
  }
  function bindNav() {
    document.querySelectorAll('button[data-nav]').forEach(b => b.onclick = () => { S.view = b.dataset.nav; render(); });
  }
  const starStr = n => '<span class="stars">' + '★'.repeat(n) + '<span class="off">' + '★'.repeat(3 - n) + '</span></span>';

  // --- home ---
  function renderHome() {
    const st = stats();
    const prog = store.get('campaign', {});
    const dr = dailyResult();
    const beaten = CAMPAIGN.filter((_, i) => prog[i] && prog[i].stars).length;
    const totalStars = CAMPAIGN.reduce((sum, _, i) => sum + ((prog[i] && prog[i].stars) || 0), 0);
    const progressPct = CAMPAIGN.length <= 1 ? 100 : Math.round(100 * Math.max(0, beaten - 1) / (CAMPAIGN.length - 1));
    const levelIcon = lv => {
      const flat = lv.map.join('');
      if (flat.includes('1')) return '📦';
      if (lv.target >= 39) return '🏆';
      if ((flat.match(/~/g) || []).length >= 8) return '🌊';
      if ((flat.match(/#/g) || []).length >= 6) return '🪨';

      if (flat.includes('u')) return '🥒';

    };
    const daily = `
      <section class="daily-panel card">

    // winding garden path: cat stands at the next unbeaten level
    const xs = [24, 72, 58, 30, 76, 24, 48, 70];

    const pts = CAMPAIGN.map((_, i) => [xs[i % xs.length], padY + i * stepY]);
    let d = `M ${pts[0][0]} ${pts[0][1]}`;
    for (let i = 1; i < pts.length; i++) {
      const [x0, y0] = pts[i - 1], [x1, y1] = pts[i];
      d += ` C ${x0} ${y0 + stepY * 0.55}, ${x1} ${y1 - stepY * 0.55}, ${x1} ${y1}`;
    }
    const nodes = CAMPAIGN.map((lv, i) => {

      return `<div class="path-node ${done ? 'done' : ''} ${i === catAt ? 'next' : ''} ${unlocked ? '' : 'locked'}" data-lv="${i}"
        style="left:${pts[i][0]}%;top:${pts[i][1]}px">

        <div class="path-card">

          </div>
          <b>${esc(lv.name)}</b>
          <span class="node-stats">${lv.rows}×${lv.cols} garden · ${lv.walls} fences</span>
          <span class="stars small">${'★'.repeat(p.stars)}<span class="off">${'★'.repeat(3 - p.stars)}</span></span>
        </div>
      </div>`;
    }).join('');
    const camp = `
      <section class="trail-card card">
        <div class="section-head">
          <div>
            <h3>Campaign Trail</h3>
            <div class="small soft">${beaten}/${CAMPAIGN.length} gardens cleared · ${totalStars}/${CAMPAIGN.length * 3} stars</div>
          </div>
          <div class="progress-pill">${Math.round(100 * beaten / CAMPAIGN.length)}%</div>
        </div>
        <div class="trail-progress"><span style="width:${Math.round(100 * beaten / CAMPAIGN.length)}%"></span></div>
        <div class="path-wrap" style="height:${pathH}px">
        <svg viewBox="0 0 100 ${pathH}" preserveAspectRatio="none">
          <path class="trail-shadow" d="${d}" fill="none"/>
          <path class="trail-path" d="${d}" fill="none" pathLength="100"/>
          <path class="trail-path trail-done" d="${d}" fill="none" pathLength="100" style="stroke-dasharray:${progressPct} 100"/>
        </svg>
        ${nodes}
        </div>
      </section>`;
    return `
      <section class="hero-card">
        <div>
          <div class="eyebrow">Enclosure puzzle</div>
          <h1>Purrimeter</h1>
          <p>Fence in the cat, claim the best meadow, and spend every fence with intent.</p>
        </div>
        <div class="hero-art" aria-hidden="true">
          <span class="hero-sun">☀</span>
          <span class="hero-cat cat">🐈</span>
          <span class="hero-fence">▥▥▥</span>
        </div>
      </section>
      <div class="stats home-stats">
        <div class="stat"><b>${st.played}</b><span>played</span></div>
        <div class="stat"><b>${st.streak}${st.streak > 1 ? '🔥' : ''}</b><span>daily streak</span></div>
        <div class="stat"><b>${st.three}</b><span>3-star</span></div>
        <div class="stat"><b>${st.bestScore}</b><span>best score</span></div>
      </div>
      ${daily}
      ${camp}
      <div class="card">
        <div class="row">
          <div class="grow small soft">
            <b style="color:var(--ink)">New here?</b> Learn the game in 30 seconds with a guided garden.
          </div>
          <button class="btn primary" id="btn-tutorial">🎓 Tutorial</button>
        </div>
      </div>
      <div class="card small soft">
        <b style="color:var(--ink)">Quick rules:</b> tap grass to place fences. The cat moves ↑↓←→ only — if it reaches the edge, it escapes.
        Once it's trapped, its meadow lights up: every glowing tile is a point, plus 🧶+3 · 🐟+10 · 🥒−5 · 📦 teleports.
        Diagonal gaps are safe!
      </div>
      ${navBar()}`;
  }

  // --- game ---
  const DECO = ['🌼', '🌿', '🌸', '🍄'];
  function decoFor(lv, r, c) {
    let h = r * 73 + c * 151 + lv.map.length * 7 + lv.walls * 13;
    h = (h * 2654435761) >>> 0;
    if ((h % 100) < 14) return DECO[h % DECO.length];
    return null;
  }
  // Pure description of one tile — shared by the full render and the incremental update.
  function computeTile(lv, r, c, ev, ctx) {
    const ch = cellCh(lv, r, c), k = key(r, c);
    const fenced = ctx.shown.has(k);
    const isCat = r === lv.cat[0] && c === lv.cat[1];
    let cls = 'tile ';
    if (ch === '~') cls += 'water';
    else if (ch === '#') cls += 'rock grass-' + ((r + c) % 2 ? 'b' : 'a');
    else cls += 'grass-' + ((r + c) % 2 ? 'b' : 'a');
    if (fenced) cls += ' fence' + (ctx.optimalView ? ' optimal' : '');
    else if (ch !== '~' && ch !== '#') cls += ' placeable';
    const inMeadow = !ev.escaped && ev.reachable.has(k);
    if (inMeadow) cls += ' roam' + (ctx.justEnclosed ? ' pop' : '');
    if (ctx.step && ctx.step.type === 'fence' && r === ctx.step.cell[0] && c === ctx.step.cell[1]) cls += ' hint';
    let inner = '';
    const deco = ch === '.' && !isCat ? decoFor(lv, r, c) : null;
    if (deco && !fenced && !inMeadow) inner += `<span class="deco">${deco}</span>`;
    // inside the pen, plain grass turns into a hay field (enclose.horse-style biome change)
    if (inMeadow && !fenced && !isCat && ch === '.' && (r * 7 + c * 13) % 4 !== 0) inner += '<span class="wheat">🌾</span>';
    if (fenced) inner += `<div class="fpost${k === S.lastFence && !ctx.optimalView ? ' new' : ''}"></div>`;
    else if (isCat) inner += '<span class="cat tile-cat">🐈</span>';
    else if (ch === 'y') inner += '<span class="item goodie">🧶</span>'; else if (ch === 't') inner += '<span class="item goodie">🐟</span>';
    else if (ch === 'u') inner += '<span class="item baditem">🥒</span>'; else if (ch >= '1' && ch <= '3') inner += `<span class="item boxitem">📦<em>${ch}</em></span>`;
    let info = '';
    if (fenced) info = '🚧 Your fence — tap to remove it';
    else if (isCat) info = '🐈 Mochi — enclose her before she reaches the edge!';
    else if (ch === 'y') info = '🧶 Yarn — +3 points if it ends up inside your fence';
    else if (ch === 't') info = '🐟 Tuna — +10 points if enclosed. Worth going for!';
    else if (ch === 'u') info = '🥒 Cucumber — −5 points if enclosed. Keep it out, or fence on top of it';
    else if (ch >= '1' && ch <= '3') info = `📦 Box ${ch} — the cat teleports between matching boxes`;
    else if (ch === '~') info = '🌊 Pond — blocks the cat. A free wall!';
    else if (ch === '#') info = '🪨 Rock — blocks the cat. A free wall!';
    const meadowDelay = inMeadow && ctx.justEnclosed
      ? (Math.abs(r - lv.cat[0]) + Math.abs(c - lv.cat[1])) * 55 : null;
    return { cls, inner, info, meadowDelay };
  }
  function statusHTML(ev, optimalView) {
    return optimalView
      ? `<span id="status" class="gold">🏆 Optimal: ${ev.score} pts</span>`
      : ev.escaped
        ? '<span id="status" class="bad">🚨 Cat can escape!</span>'
        : `<span id="status" class="ok">✅ ${ev.score} pts</span>`;
  }
  const pipsHTML = (lv, shown) =>
    Array.from({ length: lv.walls }, (_, i) => `<div class="pip ${i < shown.size ? 'used' : ''}"></div>`).join('');

  // After a full render, record each tile's expected class/inner so the first
  // incremental update doesn't see them as "changed" and rewrite the whole board.
  function primeBoard() {
    const board = $('#board');
    if (!board || !S.level) return;
    const lv = S.level;
    const shown = displayedFences();
    const ev = evaluate(lv, shown);
    const ctx = { shown, optimalView: S.submitted && S.review === 'optimal', step: tutStep(), justEnclosed: false };
    board.querySelectorAll('.tile').forEach(el => {
      const t = computeTile(lv, +el.dataset.r, +el.dataset.c, ev, ctx);
      el._c = t.cls; el._h = t.inner;
    });
  }

  // Incremental board update: touches ONLY changed tiles so running CSS animations
  // (water shimmer, cat bob, item wobble, wheat) never restart on unrelated tiles.
  function updateBoard() {
    const board = $('#board');
    if (S.view !== 'game' || !board) { render(); return; }
    const lv = S.level;
    const shown = displayedFences();
    const ev = evaluate(lv, shown);
    const justEnclosed = !ev.escaped && !S.wasEnclosed;
    S.wasEnclosed = !ev.escaped;
    const ctx = { shown, optimalView: S.submitted && S.review === 'optimal', step: tutStep(), justEnclosed };
    board.querySelectorAll('.tile').forEach(el => {
      const r = +el.dataset.r, c = +el.dataset.c;
      const t = computeTile(lv, r, c, ev, ctx);
      if (el._c !== t.cls) { el.className = t.cls; el._c = t.cls; }
      if (el._h !== t.inner) { el.innerHTML = t.inner; el._h = t.inner; }
      if (t.info) { el.dataset.info = t.info; el.title = t.info; }
      else { delete el.dataset.info; el.removeAttribute('title'); }
      el.style.animationDelay = t.meadowDelay !== null ? t.meadowDelay + 'ms' : '';
    });
    const pips = $('#hud .pips'); if (pips) pips.innerHTML = pipsHTML(lv, shown);
    const st = $('#status'); if (st) st.outerHTML = statusHTML(ev, ctx.optimalView);
    const sub = $('#game-sub'); if (sub && !S.submitted) sub.textContent = `${lv.walls - S.fences.size} of ${lv.walls} fences left`;
    const undoB = $('#btn-undo'); if (undoB) undoB.disabled = !S.undo.length;
    const resetB = $('#btn-reset'); if (resetB) resetB.disabled = !S.fences.size;
    const subB = $('#btn-submit');
    if (subB && !ctx.step) {
      subB.disabled = ev.escaped;
      subB.classList.toggle('ready', !ev.escaped && !S.submitted);
    }
  }

  function renderGame() {
    const lv = S.level;
    const shown = displayedFences();
    const ev = evaluate(lv, shown);
    const optimalView = S.submitted && S.review === 'optimal';
    const step = tutStep();
    const status = statusHTML(ev, optimalView);
    const pips = pipsHTML(lv, shown);
    const ts = Math.min(46, Math.floor((Math.min(window.innerWidth, 560) - 60) / lv.cols));
    const freshBoard = S.animKey !== S.mode + lv.name;
    S.animKey = S.mode + lv.name;
    const justEnclosed = !ev.escaped && !S.wasEnclosed && !freshBoard;
    S.wasEnclosed = !ev.escaped;
    const ctx = { shown, optimalView, step, justEnclosed };
    let tiles = '';
    for (let r = 0; r < lv.rows; r++) for (let c = 0; c < lv.cols; c++) {
      const t = computeTile(lv, r, c, ev, ctx);
      const cls = t.cls + (freshBoard ? ' enter' : '');
      let delay = '';
      if (freshBoard) delay = `animation-delay:${(r + c) * 28}ms`;
      else if (t.meadowDelay !== null) delay = `animation-delay:${t.meadowDelay}ms`;
      const infoAttr = t.info ? ` data-info="${t.info}" title="${t.info}"` : '';
      tiles += `<div class="${cls}" data-r="${r}" data-c="${c}"${infoAttr} style="${delay}">${t.inner}</div>`;
    }
    const tutBanner = step ? `
      <div class="card tut-banner">
        <div class="row">
          <div style="font-size:22px">🎓</div>
          <div class="grow small"><b>${esc(step.msg)}</b></div>
          ${step.type === 'info' ? '<button class="btn primary" id="tut-next">Got it</button>' : ''}
        </div>
      </div>` : '';
    const overlay = S.submitted && S.showOverlay ? renderResultOverlay() : '';
    const nextInBar = (S.mode === 'campaign' || S.mode === 'tutorial') && S.levelIndex < CAMPAIGN.length - 1
      ? '<button class="btn primary" id="btn-next-bar">Next level ▶</button>' : '';
    const canEditBar = S.mode !== 'daily' && S.mode !== 'tutorial' && S.result && S.result.score < lv.target;
    const continueInBar = S.submitted && canEditBar
      ? '<button class="btn" id="btn-continue-bar">✏️ Keep improving</button>' : '';
    const reviewBar = S.submitted && !S.showOverlay ? `
      <div class="actions review-bar">
        <button class="btn toggled" id="btn-review-toggle">${S.review === 'mine'
          ? `🏆 View optimal (${lv.target})`
          : `🐾 View yours (${S.result.score})`}</button>
        ${continueInBar}
        <button class="btn" id="btn-results">🏁 Results</button>
        ${nextInBar}
      </div>` : '';
    const playActions = !S.submitted ? `
      <div class="actions">
        ${step ? '' : `<button class="btn" id="btn-undo" ${S.undo.length ? '' : 'disabled'}>↶ Undo</button>`}
        ${step ? '' : `<button class="btn" id="btn-reset" ${S.fences.size ? '' : 'disabled'}>↺ Reset</button>`}
        <button class="btn good ${step && step.type === 'done' ? 'attn' : ''} ${!ev.escaped && !step ? 'ready' : ''}" id="btn-submit" ${ev.escaped || (step && step.type !== 'done') ? 'disabled' : ''}>✓ Submit</button>
      </div>` : '';
    return `
      <div class="row" style="margin-bottom:8px">
        <button class="btn ghost" data-nav="home">← ${step ? 'Skip' : 'Back'}</button>
        <div class="grow center"><b>${esc(step ? 'Tutorial' : lv.name)}</b>
          <div class="small soft" id="game-sub">${S.submitted ? `Optimal: ${lv.target} pts` : `${lv.walls - S.fences.size} of ${lv.walls} fences left`}</div></div>
        <span style="width:70px"></span>
      </div>
      ${tutBanner}
      <div id="hud"><div class="pips">${pips}</div>${status}</div>
      <div id="board-wrap"><div id="board" style="--ts:${ts}px;grid-template-columns:repeat(${lv.cols},${ts}px)">${tiles}</div></div>
      <div id="tile-hint" class="center"> </div>
      ${optimalView ? '<div class="center small soft" style="margin-bottom:6px">✨ Best-known solution found by the solver</div>' : ''}
      ${playActions}${reviewBar}
      ${overlay}${navBar()}`;
  }
  function renderResultOverlay() {
    const r = S.result;
    const perfect = r.score >= S.level.target;
    const share = currentShare();
    const pct = Math.round(100 * r.score / S.level.target);
    const lbBtn = S.mode === 'daily' ? '<button class="btn" data-nav="ranks">🏆 Ranks</button>' : '';
    const canEdit = S.mode !== 'daily' && S.mode !== 'tutorial';
    const keepGoing = canEdit && !perfect ? '<button class="btn" id="btn-continue">✏️ Keep improving</button>' : '';
    const retry = canEdit ? '<button class="btn ghost" id="btn-retry">↺ Start over</button>' : '';
    const isCamp = S.mode === 'campaign' || S.mode === 'tutorial';
    const nextBtn = isCamp && S.levelIndex < CAMPAIGN.length - 1
      ? `<button class="btn primary" id="btn-next">Next level ▶</button>` : '';
    const aiNext = S.mode === 'ai' ? '<button class="btn" data-nav="ailab">✨ New AI level</button>' : '';
    const archBtn = S.mode === 'archive' ? '<button class="btn" data-nav="archive">📚 Archive</button>' : '';
    // community comparison (daily only; demo bots + you)
    let community = '';
    if (S.mode === 'daily') {
      const stats = S.liveStats || S.leaderboard?.stats;
      community = stats
        ? `<div class="small soft" style="margin-top:4px">Community today: <b>${stats.count}</b> solves · avg <b>${stats.average || '—'}</b>${r.rank ? ` · rank <b>#${r.rank}</b>` : ''}</div>`
        : `<div class="small soft" style="margin-top:4px">Submit recorded. Open Ranks for live standings.</div>`;
    }
    const bd = (r.breakdown || []).map((b, i) =>
      `<div class="bd-line" style="animation-delay:${350 + i * 380}ms">
        <span>${esc(b.label)}</span><span class="bd-pts ${b.pts < 0 ? 'neg' : ''}">${b.pts >= 0 ? '+' : ''}${b.pts}</span>
      </div>`).join('');
    const starsHtml = [0, 1, 2].map(i =>
      `<span class="pop-star ${i < r.stars ? '' : 'off'}" style="animation-delay:${300 + i * 220}ms">★</span>`).join('');
    return `<div id="overlay"><div class="card center">
      <h2 style="font-size:26px">${perfect ? 'Purrfect! 🐾' : 'Enclosed!'}</h2>
      <div class="bigstars">${starsHtml}</div>
      <div class="bd-list">${bd}</div>
      <div style="font-size:22px;font-weight:900;margin:4px"><span id="score-count">0</span> points</div>
      <div class="small soft">Optimal: ${S.level.target} — you got ${pct}%${perfect ? '' : '. See how below!'}</div>
      ${community}
      <div class="share-pre">${esc(share)}</div>
      <div class="actions">
        ${nextBtn}${keepGoing}
        <button class="btn" id="btn-see-optimal">👀 See optimal</button>
        <button class="btn" id="btn-share">📣 Share</button>
        ${lbBtn}${retry}${aiNext}${archBtn}
        <button class="btn ghost" id="btn-close-overlay">✕ Close</button>
      </div>
    </div></div>`;
  }
  function animateOverlay() {
    const el = $('#score-count');
    if (!el || !S.result) return;
    const lines = (S.result.breakdown || []).length;
    // tick sound as each breakdown line lands
    const startDelay = 350 + lines * 380;
    const target = S.result.score, dur = 800;
    setTimeout(() => {
      const t0 = performance.now();
      (function tick(t) {
        const p = Math.min(1, (t - t0) / dur);
        el.textContent = Math.round(target * (1 - Math.pow(1 - p, 3)));
        if (p < 1) requestAnimationFrame(tick);
      })(t0);
    }, startDelay);
  }
  function bindBoard() {
    const board = $('#board');
    const cellOf = el => el && el.closest ? el.closest('.tile') : null;
    // strictly one tap = one fence (no drag-painting)
    board.addEventListener('pointerdown', e => {
      const t = cellOf(e.target); if (!t) return;
      tileTap(+t.dataset.r, +t.dataset.c);
    });
    // hover hints for objects (desktop)
    const hint = $('#tile-hint');
    board.addEventListener('mouseover', e => {
      const t = cellOf(e.target);
      if (hint) hint.textContent = (t && t.dataset.info) || ' ';
    });
    board.addEventListener('mouseleave', () => { if (hint) hint.textContent = ' '; });
    const on = (id, fn) => { const el = $(id); if (el) el.onclick = fn; };
    on('#tut-next', () => { tutAdvance(); render(); });
    on('#btn-undo', undo);
    on('#btn-submit', submit);
    on('#btn-reset', () => { if (!(S.submitted && S.mode === 'daily')) { resetPlay(); updateBoard(); } });
    on('#btn-retry', () => { resetPlay(); render(); });
    const keepImproving = () => {
      // keep the fences on the board, unlock editing, and let them refine
      S.submitted = false; S.result = null; S.showOverlay = false; S.review = 'mine';
      render();
    };
    on('#btn-continue', keepImproving);
    on('#btn-continue-bar', keepImproving);
    on('#btn-next', () => startCampaign(S.levelIndex + 1));
    on('#btn-next-bar', () => startCampaign(S.levelIndex + 1));
    on('#btn-share', doShare);
    on('#btn-close-overlay', () => { S.showOverlay = false; render(); });
    on('#btn-results', () => { S.showOverlay = true; S.review = 'mine'; render(); });
    on('#btn-review-toggle', () => {
      if (S.review === 'mine') { ensureSolution(); S.review = 'optimal'; }
      else S.review = 'mine';
      render();
    });
    on('#btn-see-optimal', () => {
      ensureSolution();
      S.showOverlay = false; S.review = 'optimal'; render();
    });
  }

  // --- daily archive ---
  const ARCHIVE_FREE = true; // future: gate old dailies behind premium
  function renderArchive() {
    const rows = [];
    for (let day = S.day; day >= Math.max(1, S.day - 60); day--) {
      const r = store.get('daily_' + day, null);
      const date = new Date(EPOCH_UTC + (day - 1) * 86400000)
        .toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      const isToday = day === S.day;
      const status = r
        ? `${r.score} pts ${'★'.repeat(r.stars)}${r.archived ? ' · replayed' : ''}`
        : isToday ? 'Not played yet' : 'Never played';
      rows.push(`
        <div class="lv-item" data-arch="${day}">
          <div class="lv-num ${isToday ? 'daily' : ''}">${isToday ? '📅' : day}</div>
          <div class="grow"><b>Daily #${day}</b>${isToday ? ' <span class="small soft">(today)</span>' : ''}
            <div class="small soft">${date} · ${esc(status)}</div></div>
          <button class="btn ${r && !isToday ? '' : 'primary'}">${isToday ? (r ? 'View' : 'Play') : r ? 'Replay' : 'Play'}</button>
        </div>`);
    }
    return `
      <h1 style="margin:10px 0">📚 Daily Archive</h1>
      <div class="small soft" style="margin-bottom:8px">Every past garden, replayable. Archived runs keep your best score and never affect your streak.${ARCHIVE_FREE ? ' Free during the beta.' : ''}</div>
      <div class="card">${rows.join('')}</div>
      ${navBar()}`;
  }

  // --- leaderboard ---
  function renderRanks() {
    const lv = getDaily();
    const dr = dailyResult();
    const rows = (S.leaderboard && S.leaderboard.scope === S.lbTab ? S.leaderboard.rows : []).map(r => ({
      ...r,
      me: S.me && r.playerId === S.me.playerId,
    }));
    const list = rows.length ? rows.map((r, i) =>
      `<div class="lb-row ${r.me ? 'me' : ''}">
        <div class="lb-rank">${i + 1}</div>
        <div class="grow"><b>${esc(r.name)}</b> ${r.me ? '<span class="small soft">(you)</span>' : ''}</div>
        ${starStr(r.stars)} <div class="lb-score">${r.score}</div>
      </div>`).join('')
      : `<div class="center soft" style="padding:20px">${S.online ? 'No entries yet today.' : 'Connecting to live ranks…'}</div>`;
    const stats = (S.leaderboard && S.leaderboard.stats) || S.liveStats;
    const buckets = stats?.buckets || [0, 0, 0, 0];
    const maxB = Math.max(1, ...buckets);
    const bLabels = ['<50%', '50–79%', '80–99%', 'optimal'];
    const histo = buckets.map((b, i) =>
      `<div class="bar-row"><span class="bar-label">${bLabels[i]}</span>
        <div class="bar-track"><div class="bar ${i === 3 ? 'bar-gold' : ''}" style="width:${Math.round(100 * b / maxB)}%"></div></div>
        <span class="bar-n">${b}</span></div>`).join('');
    const hist = store.get('history', []);
    const subs = hist.filter(h => h.target > 0);
    const avgPct = subs.length ? Math.round(100 * subs.reduce((a, h) => a + h.score / h.target, 0) / subs.length) : null;
    const myStats = `
      <div class="card">
        <h3>Your stats</h3>
        <div class="stats" style="margin-top:8px">
          <div class="stat"><b>${subs.length}</b><span>submissions</span></div>
          <div class="stat"><b>${avgPct === null ? '—' : avgPct + '%'}</b><span>avg of optimal</span></div>
          <div class="stat"><b>${subs.filter(h => h.stars === 3).length}</b><span>optimal solves</span></div>
        </div>
      </div>`;
    const community = `
      <div class="card">
        <h3>Today's community <span class="small soft">live</span></h3>
        <div class="small soft" style="margin:2px 0 8px">Submissions: <b>${stats?.count || 0}</b> · Average score: <b>${stats?.average || '—'}</b>${dr && lv.target ? ` · optimal is ${lv.target}` : ' · play to reveal the optimal!'}</div>
        ${histo}
      </div>`;
    return `
      <h1 style="margin:10px 0">🏆 Daily #${S.day}</h1>
      <div class="small soft" style="margin-bottom:8px">${dr ? `You scored ${dr.score} · optimal was ${lv.target}` : 'Not played yet — scores hide the optimal until you submit.'}</div>
      <div class="tabs">
        <button class="btn ${S.lbTab === 'global' ? 'primary' : ''}" data-tab="global">Global</button>
        <button class="btn ${S.lbTab === 'friends' ? 'primary' : ''}" data-tab="friends">Friends</button>
      </div>
      <div class="card">${list}</div>
      ${S.lbTab === 'friends' ? `
      <div class="card">
        <h3>Add a friend</h3>
        <div class="small soft">Paste their server friend code. Yours is in Settings.</div>
        <div class="row" style="margin-top:8px">
          <input id="friend-code" placeholder="PURR2-…">
          <button class="btn primary" id="btn-addfriend">Add</button>
        </div>
      </div>
      <div class="card small soft">Friend boards are server-backed and use signed codes, so forged codes are rejected.</div>` : `
      <div class="card small soft">Global scores are live server submissions. Daily scores are accepted once per player.</div>`}
      ${community}${myStats}
      ${navBar()}`;
  }
  async function refreshLeaderboard() {
    if (S.ranksLoading) return;
    S.ranksLoading = true;
    try {
      await ensureAuth();
      const data = await apiFetch(`/api/leaderboard/${S.day}?scope=${encodeURIComponent(S.lbTab)}`);
      S.leaderboard = data;
      S.liveStats = data.stats;
      S.online = true;
      if (S.view === 'ranks') render();
    } catch (e) {
      S.online = false;
    } finally {
      S.ranksLoading = false;
    }
  }
  function bindRanks() {
    if (!S.leaderboard || S.leaderboard.scope !== S.lbTab) refreshLeaderboard();
    document.querySelectorAll('[data-tab]').forEach(b => b.onclick = () => { S.lbTab = b.dataset.tab; S.leaderboard = null; render(); });
    const add = $('#btn-addfriend');
    if (add) add.onclick = async () => {
      try {
        await ensureAuth();
        const res = await apiFetch('/api/friends', { method: 'POST', body: JSON.stringify({ code: $('#friend-code').value }) });
        toast('Added ' + res.friend.name + '!');
        refreshLeaderboard();
      } catch (e) {
        toast(e.message || 'Invalid code');
      }
    };
  }

  // --- AI lab ---
  function renderAiLab() {
    return `
      <h1 style="margin:10px 0">🤖 AI Level Lab</h1>
      <div class="card">
        <h3>Owner generation is protected</h3>
        <div class="small soft">Production AI generation now runs server-side from the admin area. Provider keys never live in the browser.</div>
        <div class="actions" style="justify-content:flex-start">
          <a class="btn primary" href="admin.html">Admin</a>
          <button class="btn" id="btn-gen-local">🎲 Random (no AI)</button>
        </div>
        <div id="gen-status" class="small soft" style="margin-top:8px"></div>
      </div>
      ${navBar()}`;
  }
  function bindAiLab() {
    const status = msg => { const el = $('#gen-status'); if (el) el.textContent = msg; };
    $('#btn-gen-local').onclick = () => {
      status('Generating locally…');
      const lv = generateLevel((Date.now() ^ Math.floor(Math.random() * 1e9)) % 2 ** 31, { name: 'Random Garden' });
      startAi(lv);
    };
  }

  // --- settings ---
  function renderSettings() {
    return `
      <h1 style="margin:10px 0">⚙️ Settings</h1>
      <div class="card">
        <label>Your name (for leaderboards & sharing)</label>
        <input id="set-name" value="${esc(settings.name)}" maxlength="14">
        <div class="small soft" style="margin-top:8px">Your device account is anonymous. This name is shown on daily leaderboards after you submit.</div>
        ${S.me && S.me.friendCode ? `<label>Friend code</label><input readonly value="${esc(S.me.friendCode)}">` : ''}
        <div class="actions" style="justify-content:flex-start">
          <button class="btn primary" id="btn-save">Save</button>
        </div>
      </div>
      <div class="card small soft">
        <b style="color:var(--ink)">About:</b> Purrimeter is an enclosure puzzle. Campaign targets and daily/AI goals are computed by a built-in solver, so 3 stars is always achievable — and after any game you can view the solver's optimal fences.
      </div>
      ${navBar()}`;
  }
  function bindSettings() {
    $('#btn-save').onclick = async () => {
      settings = {
        name: $('#set-name').value.trim() || 'You',
      };
      store.set('settings', settings);
      try {
        await ensureAuth();
        const saved = await apiFetch('/api/me/name', { method: 'POST', body: JSON.stringify({ name: settings.name }) });
        settings.name = saved.name;
        store.set('settings', settings);
        await loadMe();
      } catch (e) {
        toast(e.message || 'Saved locally only');
        S.view = 'home'; render();
        return;
      }
      toast('Saved!'); S.view = 'home'; render();
    };
  }

  // ---------- boot ----------
  document.addEventListener('click', e => {
    const nav = e.target.closest && e.target.closest('a[data-nav]');
    if (nav) { e.preventDefault(); S.view = nav.dataset.nav; render(); }
    const dl = e.target.closest && e.target.closest('[data-daily]');
    if (dl) startDaily();
    const arch = e.target.closest && e.target.closest('[data-arch]');
    if (arch) startArchive(+arch.dataset.arch);
    const lvEl = e.target.closest && e.target.closest('[data-lv]');
    if (lvEl) startCampaign(+lvEl.dataset.lv);
  });
  window.addEventListener('resize', () => { if (S.view === 'game') render(); });
  loadMe().then(() => {
    if (!store.get('tutorialDone', false)) startTutorial(); else render();
  });
})();
</script>
</body>
</html>
